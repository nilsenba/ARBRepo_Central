name: Reusable Qlik Production Promotion

on:
  workflow_call:
    inputs:
      operation:
        required: true
        type: string
      jira_key:
        required: true
        type: string
      artifact_repo_full_name:
        required: true
        type: string
      artifact_ref:
        required: true
        type: string
      source_branch:
        required: true
        type: string
      source_sha:
        required: true
        type: string
      main_sha:
        required: true
        type: string
      dry_run:
        required: false
        type: boolean
        default: true
    secrets:
      QLIK_SANDBOX_TENANT_URL:
        required: false
      QLIK_SANDBOX_API_KEY:
        required: false
        
permissions:
  contents: read

jobs:
  deploy:
    name: Resolve promotion context
    runs-on: ubuntu-latest

    steps:
      - name: Show received inputs
        run: |
          echo "Operation: ${{ inputs.operation }}"
          echo "Jira key: ${{ inputs.jira_key }}"
          echo "Artifact repo: ${{ inputs.artifact_repo_full_name }}"
          echo "Artifact ref: ${{ inputs.artifact_ref }}"
          echo "Source branch: ${{ inputs.source_branch }}"
          echo "Source SHA: ${{ inputs.source_sha }}"
          echo "Main SHA: ${{ inputs.main_sha }}"
          echo "Dry run: ${{ inputs.dry_run }}"

      - name: Checkout Qlik artifact repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.artifact_repo_full_name }}
          ref: ${{ inputs.artifact_ref }}
          path: artifact

      - name: Resolve and validate promotion context
        id: context
        shell: bash
        env:
          OPERATION: ${{ inputs.operation }}
          JIRA_KEY: ${{ inputs.jira_key }}
          ARTIFACT_REPO_FULL_NAME: ${{ inputs.artifact_repo_full_name }}
          ARTIFACT_REF: ${{ inputs.artifact_ref }}
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          MAIN_SHA: ${{ inputs.main_sha }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          if ! [[ "$JIRA_KEY" =~ ^[A-Z][A-Z0-9]+-[0-9]+$ ]]; then
            echo "Jira key must look like BIOPS-64108."
            exit 1
          fi

          if [[ "$SOURCE_BRANCH" != "$JIRA_KEY" ]]; then
            echo "Source branch must match Jira key."
            echo "Jira key: $JIRA_KEY"
            echo "Source branch: $SOURCE_BRANCH"
            exit 1
          fi

          if [[ -z "$ARTIFACT_REPO_FULL_NAME" || -z "$ARTIFACT_REF" || -z "$MAIN_SHA" ]]; then
            echo "Artifact repo, artifact ref, and main SHA are required."
            exit 1
          fi

          CHECKED_OUT_SHA="$(git -C artifact rev-parse HEAD)"
          ARTIFACT_REPO_NAME="${ARTIFACT_REPO_FULL_NAME##*/}"

          {
            echo "jira_key=$JIRA_KEY"
            echo "artifact_repo_full_name=$ARTIFACT_REPO_FULL_NAME"
            echo "artifact_repo_name=$ARTIFACT_REPO_NAME"
            echo "artifact_ref=$ARTIFACT_REF"
            echo "checked_out_sha=$CHECKED_OUT_SHA"
            echo "source_branch=$SOURCE_BRANCH"
            echo "source_sha=$SOURCE_SHA"
            echo "main_sha=$MAIN_SHA"
            echo "dry_run=$DRY_RUN"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved promotion context:"
          echo "  Jira key: $JIRA_KEY"
          echo "  Artifact repo: $ARTIFACT_REPO_FULL_NAME"
          echo "  Artifact repo name: $ARTIFACT_REPO_NAME"
          echo "  Artifact ref requested: $ARTIFACT_REF"
          echo "  Artifact checkout SHA: $CHECKED_OUT_SHA"
          echo "  Source branch: $SOURCE_BRANCH"
          echo "  Source SHA declared: $SOURCE_SHA"
          echo "  Main SHA declared: $MAIN_SHA"
          echo "  Dry run: $DRY_RUN"

      - name: Locate Qlik package artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t qvf_files < <(find artifact -type f -iname "*.qvf" | sort)

          if [[ "${#qvf_files[@]}" -eq 0 ]]; then
            echo "No Qlik .qvf artifact found in the checked-out artifact repository."
            echo "Files found:"
            find artifact -type f | sort
            exit 1
          fi

          if [[ "${#qvf_files[@]}" -gt 1 ]]; then
            echo "Multiple Qlik .qvf artifacts found. The workflow needs exactly one package."
            printf '%s\n' "${qvf_files[@]}"
            exit 1
          fi

          ARTIFACT_PATH="${qvf_files[0]}"
          ARTIFACT_NAME="$(basename "$ARTIFACT_PATH")"
          ARTIFACT_SIZE_BYTES="$(wc -c < "$ARTIFACT_PATH" | tr -d ' ')"
          ARTIFACT_SHA256="$(sha256sum "$ARTIFACT_PATH" | awk '{print $1}')"

          {
            echo "artifact_path=$ARTIFACT_PATH"
            echo "artifact_name=$ARTIFACT_NAME"
            echo "artifact_size_bytes=$ARTIFACT_SIZE_BYTES"
            echo "artifact_sha256=$ARTIFACT_SHA256"
          } >> "$GITHUB_OUTPUT"

          echo "Located Qlik package artifact:"
          echo "  Path: $ARTIFACT_PATH"
          echo "  Name: $ARTIFACT_NAME"
          echo "  Size bytes: $ARTIFACT_SIZE_BYTES"
          echo "  SHA256: $ARTIFACT_SHA256"

      - name: Resolve target Qlik space
        id: target
        shell: bash
        run: |
          set -euo pipefail

          TARGET_SPACE_NAME="Monitoring Apps - CICD POC"
          TARGET_ENVIRONMENT="sandbox-cicd-poc"

          {
            echo "target_space_name=$TARGET_SPACE_NAME"
            echo "target_environment=$TARGET_ENVIRONMENT"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved target Qlik space:"
          echo "  Environment: $TARGET_ENVIRONMENT"
          echo "  Space: $TARGET_SPACE_NAME"

      - name: Resolve Qlik sandbox space id
        id: qlik_space
        shell: pwsh
        env:
          QLIK_SANDBOX_TENANT_URL: ${{ secrets.QLIK_SANDBOX_TENANT_URL }}
          QLIK_SANDBOX_API_KEY: ${{ secrets.QLIK_SANDBOX_API_KEY }}
          TARGET_SPACE_NAME: ${{ steps.target.outputs.target_space_name }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          $ErrorActionPreference = "Stop"
          $dryRun = [System.Convert]::ToBoolean($env:DRY_RUN)

          if ($dryRun) {
            "space_id=DRY_RUN" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Dry run enabled. Would resolve Qlik space: $env:TARGET_SPACE_NAME"
            return
          }

          if ([string]::IsNullOrWhiteSpace($env:QLIK_SANDBOX_TENANT_URL) -or [string]::IsNullOrWhiteSpace($env:QLIK_SANDBOX_API_KEY)) {
            throw "Missing QLIK_SANDBOX_TENANT_URL or QLIK_SANDBOX_API_KEY."
          }

          $tenant = $env:QLIK_SANDBOX_TENANT_URL.TrimEnd("/")
          $headers = @{
            Authorization = "Bearer $env:QLIK_SANDBOX_API_KEY"
            Accept = "application/json"
          }

          $encodedName = [System.Uri]::EscapeDataString($env:TARGET_SPACE_NAME)
          $spaces = Invoke-RestMethod -Method Get -Uri "$tenant/api/v1/spaces?name=$encodedName&limit=100" -Headers $headers
          $matches = @($spaces.data | Where-Object { $_.name -eq $env:TARGET_SPACE_NAME })

          if ($matches.Count -ne 1) {
            throw "Expected exactly one Qlik space named '$env:TARGET_SPACE_NAME', found $($matches.Count)."
          }

          $spaceId = $matches[0].id
          $space = $matches[0]

          Write-Host "Qlik target space access:"
          Write-Host "  Name: $($space.name)"
          Write-Host "  Type: $($space.type)"
          Write-Host "  Roles: $($space.meta.roles -join ', ')"
          Write-Host "  Actions: $($space.meta.actions -join ', ')"

          if ($space.meta.actions -notcontains "create") {
            throw "API key user can see the space but does not have 'create' action in '$env:TARGET_SPACE_NAME'. Add the user/service account to the space with create/import-capable access."
          }

          "space_id=$spaceId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "space_type=$($space.type)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Resolved Qlik sandbox space:"
          Write-Host "  Name: $env:TARGET_SPACE_NAME"
          Write-Host "  ID: $spaceId"
          Write-Host "  Type: $($space.type)"

      - name: Check Qlik app privileges
        shell: pwsh
        env:
          QLIK_SANDBOX_TENANT_URL: ${{ secrets.QLIK_SANDBOX_TENANT_URL }}
          QLIK_SANDBOX_API_KEY: ${{ secrets.QLIK_SANDBOX_API_KEY }}
        run: |
          $tenant = $env:QLIK_SANDBOX_TENANT_URL.TrimEnd("/")
          $headers = @{
            Authorization = "Bearer $env:QLIK_SANDBOX_API_KEY"
            Accept = "application/json"
          }

          $privileges = Invoke-RestMethod -Method Get -Uri "$tenant/api/v1/apps/privileges" -Headers $headers
          Write-Host "Qlik app privileges for API key user:"
          $privileges | ConvertTo-Json -Depth 5

      - name: Import QVF into Qlik sandbox POC space
        id: qlik_import
        shell: pwsh
        env:
          QLIK_SANDBOX_TENANT_URL: ${{ secrets.QLIK_SANDBOX_TENANT_URL }}
          QLIK_SANDBOX_API_KEY: ${{ secrets.QLIK_SANDBOX_API_KEY }}
          QLIK_SPACE_ID: ${{ steps.qlik_space.outputs.space_id }}
          QLIK_SPACE_TYPE: ${{ steps.qlik_space.outputs.space_type }}
          QLIK_ARTIFACT_PATH: ${{ steps.artifact.outputs.artifact_path }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          $ErrorActionPreference = "Stop"
          $dryRun = [System.Convert]::ToBoolean($env:DRY_RUN)
          $appName = [System.IO.Path]::GetFileNameWithoutExtension($env:QLIK_ARTIFACT_PATH)

          if ($dryRun) {
            Write-Host "Dry run enabled. Would import QVF:"
            Write-Host "  File: $env:QLIK_ARTIFACT_PATH"
            Write-Host "  App name: $appName"
            Write-Host "  Space ID: $env:QLIK_SPACE_ID"
            return
          }

          $tenant = $env:QLIK_SANDBOX_TENANT_URL.TrimEnd("/")
          $headers = @{
            Authorization = "Bearer $env:QLIK_SANDBOX_API_KEY"
            Accept = "application/json"
          }

          function Invoke-QlikRequest {
            param(
              [Parameter(Mandatory=$true)][string]$Label,
              [Parameter(Mandatory=$true)][string]$Method,
              [Parameter(Mandatory=$true)][string]$Uri,
              [hashtable]$Headers,
              [string]$ContentType,
              [string]$InFile,
              [string]$Body
            )

            $parameters = @{
              Method = $Method
              Uri = $Uri
              Headers = $Headers
              SkipHttpErrorCheck = $true
            }

            if (-not [string]::IsNullOrWhiteSpace($ContentType)) {
              $parameters.ContentType = $ContentType
            }
            if (-not [string]::IsNullOrWhiteSpace($InFile)) {
              $parameters.InFile = $InFile
            }
            if (-not [string]::IsNullOrWhiteSpace($Body)) {
              $parameters.Body = $Body
            }

            $result = Invoke-WebRequest @parameters

            if ($result.StatusCode -lt 200 -or $result.StatusCode -ge 300) {
              Write-Host "$Label failed."
              Write-Host "  HTTP status: $($result.StatusCode)"

              if (-not [string]::IsNullOrWhiteSpace($result.Content)) {
                Write-Host "Qlik error body:"
                Write-Host $result.Content
              } else {
                Write-Host "Qlik returned no response body."
              }

              throw "$Label failed with HTTP status $($result.StatusCode)."
            }

            return $result
          }

          $encodedName = [System.Uri]::EscapeDataString($appName)
          $spaceType = $env:QLIK_SPACE_TYPE
          if ([string]::IsNullOrWhiteSpace($spaceType)) {
            $spaceType = "unknown"
          }

          Write-Host "Import request:"
          Write-Host "  Endpoint: /api/v1/apps/import"
          Write-Host "  Mode: NEW"
          Write-Host "  App name: $appName"
          Write-Host "  Space ID: $env:QLIK_SPACE_ID"
          Write-Host "  Space type: $spaceType"

          if ($spaceType -eq "managed") {
            $importUri = "$tenant/api/v1/apps/import?mode=NEW&name=$encodedName"
            Write-Host "Managed target space detected. Importing source app first, then publishing to managed space."

            $importResponse = Invoke-QlikRequest `
              -Label "Qlik source import" `
              -Method "Post" `
              -Uri $importUri `
              -Headers $headers `
              -ContentType "application/octet-stream" `
              -InFile $env:QLIK_ARTIFACT_PATH

            $importBody = $importResponse.Content | ConvertFrom-Json
            $sourceAppId = $importBody.attributes.id
            if ([string]::IsNullOrWhiteSpace($sourceAppId)) {
              throw "Qlik source import succeeded, but no app ID was returned."
            }

            Write-Host "Imported QVF as source app:"
            Write-Host "  Source app ID: $sourceAppId"

            $publishUri = "$tenant/api/v1/apps/$sourceAppId/publish"
            $publishBody = @{
              moveApp = $false
              spaceId = $env:QLIK_SPACE_ID
              attributes = @{
                name = $appName
                description = "Published by GitHub Actions from $env:GITHUB_REPOSITORY run $env:GITHUB_RUN_ID"
              }
            } | ConvertTo-Json -Depth 5

            Write-Host "Publish request:"
            Write-Host "  Endpoint: /api/v1/apps/$sourceAppId/publish"
            Write-Host "  Target managed space ID: $env:QLIK_SPACE_ID"

            $publishResponse = Invoke-QlikRequest `
              -Label "Qlik managed-space publish" `
              -Method "Post" `
              -Uri $publishUri `
              -Headers $headers `
              -ContentType "application/json" `
              -Body $publishBody

            $publishResponseBody = $publishResponse.Content | ConvertFrom-Json
            $publishedAppId = $publishResponseBody.attributes.id
            "source_app_id=$sourceAppId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "app_id=$publishedAppId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

            Write-Host "Published QVF into Qlik managed space:"
            Write-Host "  App name: $appName"
            Write-Host "  Source app ID: $sourceAppId"
            Write-Host "  Published app ID: $publishedAppId"
            Write-Host "  Managed space ID: $env:QLIK_SPACE_ID"
          } else {
            $encodedSpaceId = [System.Uri]::EscapeDataString($env:QLIK_SPACE_ID)
            $uri = "$tenant/api/v1/apps/import?mode=NEW&spaceId=$encodedSpaceId&name=$encodedName"

            $response = Invoke-QlikRequest `
              -Label "Qlik import" `
              -Method "Post" `
              -Uri $uri `
              -Headers $headers `
              -ContentType "application/octet-stream" `
              -InFile $env:QLIK_ARTIFACT_PATH

            $responseBody = $response.Content | ConvertFrom-Json
            $appId = $responseBody.attributes.id
            "app_id=$appId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

            Write-Host "Imported QVF into Qlik sandbox:"
            Write-Host "  App name: $appName"
            Write-Host "  App ID: $appId"
            Write-Host "  Space ID: $env:QLIK_SPACE_ID"
          }

      - name: Setup Snowflake CLI
        if: ${{ always() && inputs.operation == 'deploy' && inputs.dry_run == false }}
        uses: snowflakedb/snowflake-cli-action@v2.0.2
        with:
          cli-version: "3.11"

      - name: Write deployment change audit to Snowflake
        if: ${{ success() && inputs.operation == 'deploy' && inputs.dry_run == false }}
        shell: bash
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: PLAY
        run: |
          set -euo pipefail

          APP_NAME="${{ steps.artifact.outputs.artifact_name }}"
          APP_NAME_NO_EXT="${APP_NAME%.qvf}"
          ARTIFACT_REPO="${{ steps.context.outputs.artifact_repo_full_name }}"
          ARTIFACT_SHA="${{ steps.context.outputs.checked_out_sha }}"
          ARTIFACT_PATH="${{ steps.artifact.outputs.artifact_path }}"
          ARTIFACT_REPO_PATH="${ARTIFACT_PATH#artifact/}"
          CODE_REPO_LINK="https://github.com/${ARTIFACT_REPO}/blob/${ARTIFACT_SHA}/${ARTIFACT_REPO_PATH// /%20}"
          COMMIT_URL="https://github.com/${ARTIFACT_REPO}/commit/${ARTIFACT_SHA}"

          cat > deployment_change_log.sql <<SQL
          MERGE INTO PLAY.DEPLOYMENT_CHANGE_LOG AS tgt
          USING (
              SELECT
                  'Qlik' AS BI_TOOL,
                  '${{ steps.context.outputs.source_branch }}' AS ENVIRONMENT_SOURCE,
                  '${{ steps.target.outputs.target_environment }}' AS ENVIRONMENT_TARGET,
                  '${{ steps.target.outputs.target_space_name }}' AS SYSTEM_NAME,
                  '${APP_NAME}' AS APP_OBJECT_NAME,
                  'Application Deployment' AS CHANGE_TYPE,
                  CURRENT_TIMESTAMP()::TIMESTAMP_NTZ AS CHANGE_DATE,
                  CURRENT_TIMESTAMP()::TIMESTAMP_NTZ AS AUDIT_TS,
                  'GitHub Actions: Monitoring-Apps/.github/workflows/qlik-prod-promotion.yml -> ARBRepo_Central/.github/workflows/reusable-qlik-prod-promotion.yml' AS CICD_PROCESS,
                  '${GITHUB_RUN_ID}' AS AUTOMATION_RUN_ID,
                  '${{ steps.qlik_space.outputs.space_id }}' AS SOURCE_CONTAINER_ID,
                  '${{ steps.target.outputs.target_space_name }}' AS SOURCE_CONTAINER_NAME,
                  '${{ steps.qlik_import.outputs.app_id }}' AS APP_ID,
                  '${GITHUB_ACTOR}' AS APP_OWNER,
                  '${ARTIFACT_REPO}' AS GITHUB_REPO,
                  '${{ inputs.source_branch }}' AS GITHUB_BRANCH,
                  '${{ steps.context.outputs.checked_out_sha }}' AS GITHUB_COMMIT_SHA,
                  '${COMMIT_URL}' AS GITHUB_COMMIT_URL,
                  'Production promotion of ${APP_NAME} to Qlik space ${{ steps.target.outputs.target_space_name }}. Artifact SHA256 ${{ steps.artifact.outputs.artifact_sha256 }}. GitHub run https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}.' AS DESCRIPTION,
                  '${GITHUB_ACTOR}' AS CHANGED_BY,
                  '${GITHUB_ACTOR}' AS CHANGE_APPROVER,
                  '${{ inputs.jira_key }}' AS RELEASE_NUMBER,
                  '${CODE_REPO_LINK}' AS CODE_REPO_LINK,
                  '${{ inputs.jira_key }}' AS JIRA_TICKET_NUMBER,
                  'publish success' AS STATUS,
                  'NO ERROR' AS ERROR_MESSAGE,
                  CURRENT_TIMESTAMP()::TIMESTAMP_NTZ AS CREATED_AT,
                  CURRENT_TIMESTAMP()::TIMESTAMP_NTZ AS UPDATED_AT
          ) AS src
          ON tgt.AUTOMATION_RUN_ID = src.AUTOMATION_RUN_ID
          WHEN MATCHED THEN UPDATE SET
              BI_TOOL = src.BI_TOOL,
              ENVIRONMENT_SOURCE = src.ENVIRONMENT_SOURCE,
              ENVIRONMENT_TARGET = src.ENVIRONMENT_TARGET,
              SYSTEM_NAME = src.SYSTEM_NAME,
              APP_OBJECT_NAME = src.APP_OBJECT_NAME,
              CHANGE_TYPE = src.CHANGE_TYPE,
              CHANGE_DATE = src.CHANGE_DATE,
              AUDIT_TS = src.AUDIT_TS,
              CICD_PROCESS = src.CICD_PROCESS,
              SOURCE_CONTAINER_ID = src.SOURCE_CONTAINER_ID,
              SOURCE_CONTAINER_NAME = src.SOURCE_CONTAINER_NAME,
              APP_ID = src.APP_ID,
              APP_OWNER = src.APP_OWNER,
              GITHUB_REPO = src.GITHUB_REPO,
              GITHUB_BRANCH = src.GITHUB_BRANCH,
              GITHUB_COMMIT_SHA = src.GITHUB_COMMIT_SHA,
              GITHUB_COMMIT_URL = src.GITHUB_COMMIT_URL,
              DESCRIPTION = src.DESCRIPTION,
              CHANGED_BY = src.CHANGED_BY,
              CHANGE_APPROVER = src.CHANGE_APPROVER,
              RELEASE_NUMBER = src.RELEASE_NUMBER,
              CODE_REPO_LINK = src.CODE_REPO_LINK,
              JIRA_TICKET_NUMBER = src.JIRA_TICKET_NUMBER,
              STATUS = src.STATUS,
              ERROR_MESSAGE = src.ERROR_MESSAGE,
              UPDATED_AT = CURRENT_TIMESTAMP()::TIMESTAMP_NTZ
          WHEN NOT MATCHED THEN INSERT (
              BI_TOOL, ENVIRONMENT_SOURCE, ENVIRONMENT_TARGET, SYSTEM_NAME,
              APP_OBJECT_NAME, CHANGE_TYPE, CHANGE_DATE, AUDIT_TS, CICD_PROCESS,
              AUTOMATION_RUN_ID, SOURCE_CONTAINER_ID, SOURCE_CONTAINER_NAME,
              APP_ID, APP_OWNER, GITHUB_REPO, GITHUB_BRANCH, GITHUB_COMMIT_SHA,
              GITHUB_COMMIT_URL, DESCRIPTION, CHANGED_BY, CHANGE_APPROVER,
              RELEASE_NUMBER, CODE_REPO_LINK, JIRA_TICKET_NUMBER, STATUS,
              ERROR_MESSAGE, CREATED_AT, UPDATED_AT
          ) VALUES (
              src.BI_TOOL, src.ENVIRONMENT_SOURCE, src.ENVIRONMENT_TARGET,
              src.SYSTEM_NAME, src.APP_OBJECT_NAME, src.CHANGE_TYPE,
              src.CHANGE_DATE, src.AUDIT_TS, src.CICD_PROCESS,
              src.AUTOMATION_RUN_ID, src.SOURCE_CONTAINER_ID,
              src.SOURCE_CONTAINER_NAME, src.APP_ID, src.APP_OWNER,
              src.GITHUB_REPO, src.GITHUB_BRANCH, src.GITHUB_COMMIT_SHA,
              src.GITHUB_COMMIT_URL, src.DESCRIPTION, src.CHANGED_BY,
              src.CHANGE_APPROVER, src.RELEASE_NUMBER, src.CODE_REPO_LINK,
              src.JIRA_TICKET_NUMBER, src.STATUS, src.ERROR_MESSAGE,
              src.CREATED_AT, src.UPDATED_AT
          );
          SQL

          snow connection test -x
          echo "Audit values:"
          echo "  branch=${{ inputs.source_branch }}"
          echo "  commit=${{ steps.context.outputs.checked_out_sha }}"
          echo "  jira=${{ inputs.jira_key }}"
          echo "  status=publish success"
          snow sql -x \
            --database "$SNOWFLAKE_DATABASE" \
            --schema "$SNOWFLAKE_SCHEMA" \
            --role "$SNOWFLAKE_ROLE" \
            --warehouse "$SNOWFLAKE_WAREHOUSE" \
            -f deployment_change_log.sql

      - name: Confirm artifact checkout
        run: |
          echo "Artifact folder:"
          ls -la artifact

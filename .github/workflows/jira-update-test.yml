name: Jira Update Test

on:
  workflow_dispatch:
    inputs:
      jira_key:
        description: Jira issue key
        required: true
        default: BIOPS-48158
        type: string
      dry_run:
        description: Validate only, do not write to Jira
        required: true
        default: false
        type: boolean
      transition_id:
        description: Optional Jira transition ID
        required: false
        type: string
      payload_json:
        description: Deployment audit payload from ARBAutomation
        required: false
        default: "{}"
        type: string

permissions:
  contents: read

jobs:
  jira-update:
    runs-on: [self-hosted, nov-network, jira]

    steps:
      - name: Update Jira issue
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        env:
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
          JIRA_PAT: ${{ secrets.QLIK_JIRA_PAT }}
          JIRA_KEY: ${{ inputs.jira_key }}
          DRY_RUN: ${{ inputs.dry_run }}
          TRANSITION_ID: ${{ inputs.transition_id }}
          PAYLOAD_JSON: ${{ inputs.payload_json }}
        run: |
          $ErrorActionPreference = "Stop"

          function Get-PayloadValue {
            param(
              [object]$Payload,
              [string[]]$Names
            )

            if ($null -eq $Payload) {
              return $null
            }

            foreach ($name in $Names) {
              $property = $Payload.PSObject.Properties | Where-Object { $_.Name -ieq $name } | Select-Object -First 1
              if ($null -ne $property) {
                return $property.Value
              }
            }

            return $null
          }

          if ([string]::IsNullOrWhiteSpace($env:JIRA_BASE_URL)) { throw "Missing JIRA_BASE_URL." }
          if ([string]::IsNullOrWhiteSpace($env:JIRA_PAT)) { throw "Missing JIRA_PAT." }
          if ($env:JIRA_KEY -notmatch '^[A-Z][A-Z0-9]+-[0-9]+$') { throw "Invalid Jira key: $env:JIRA_KEY" }

          $baseUrl = $env:JIRA_BASE_URL.TrimEnd("/")
          $headers = @{
            Authorization = "Bearer $env:JIRA_PAT"
            Accept = "application/json"
            "Content-Type" = "application/json"
          }

          $issue = Invoke-RestMethod -Method Get -Uri "$baseUrl/rest/api/2/issue/$env:JIRA_KEY" -Headers $headers
          Write-Host "Resolved Jira issue: $($issue.key) - $($issue.fields.summary)"

          $payload = $null
          $payloadText = $env:PAYLOAD_JSON
          if (-not [string]::IsNullOrWhiteSpace($payloadText) -and $payloadText.Trim() -ne "{}") {
            try {
              $payload = $payloadText | ConvertFrom-Json
            } catch {
              throw "PAYLOAD_JSON was provided but was not valid JSON. $($_.Exception.Message)"
            }
          }

          $commentLines = @("Deployment audit:")

          if ($null -ne $payload) {
            $fieldMap = @(
              @{ Label = "Status"; Names = @("status", "STATUS") },
              @{ Label = "App object"; Names = @("app_object_name", "APP_OBJECT_NAME") },
              @{ Label = "Environment source"; Names = @("environment_source", "ENVIRONMENT_SOURCE") },
              @{ Label = "Environment target"; Names = @("environment_target", "ENVIRONMENT_TARGET") },
              @{ Label = "GitHub repo"; Names = @("github_repo", "GITHUB_REPO") },
              @{ Label = "GitHub branch"; Names = @("github_branch", "GITHUB_BRANCH") },
              @{ Label = "GitHub commit SHA"; Names = @("github_commit_sha", "GITHUB_COMMIT_SHA") },
              @{ Label = "GitHub commit URL"; Names = @("github_commit_url", "GITHUB_COMMIT_URL") },
              @{ Label = "Code repo link"; Names = @("code_repo_link", "CODE_REPO_LINK") },
              @{ Label = "Automation run ID"; Names = @("automation_run_id", "AUTOMATION_RUN_ID") },
              @{ Label = "Error message"; Names = @("error_message", "ERROR_MESSAGE") }
            )

            foreach ($field in $fieldMap) {
              $value = Get-PayloadValue -Payload $payload -Names $field["Names"]
              if ($null -ne $value -and -not [string]::IsNullOrWhiteSpace([string]$value)) {
                $commentLines += "$($field["Label"]): $value"
              }
            }
          } else {
            $commentLines += "No deployment payload was provided."
          }

          $promotionWorkflowUrl = Get-PayloadValue -Payload $payload -Names @("promotion_workflow_url", "PROMOTION_WORKFLOW_URL")
          if ([string]::IsNullOrWhiteSpace([string]$promotionWorkflowUrl)) {
            $githubRepo = Get-PayloadValue -Payload $payload -Names @("github_repo", "GITHUB_REPO")
            if (-not [string]::IsNullOrWhiteSpace([string]$githubRepo)) {
              $promotionWorkflowFile = Get-PayloadValue -Payload $payload -Names @("promotion_workflow_file", "PROMOTION_WORKFLOW_FILE")
              if ([string]::IsNullOrWhiteSpace([string]$promotionWorkflowFile)) {
                $promotionWorkflowFile = "qlik-prod-promotion.yml"
              }
              $promotionWorkflowUrl = "https://github.com/$githubRepo/actions/workflows/$promotionWorkflowFile"
            }
          }

          $commentLines += ""
          if (-not [string]::IsNullOrWhiteSpace([string]$promotionWorkflowUrl)) {
            $commentLines += "Please validate. Once Validated, please send to the Space Owner for final production migration here: $promotionWorkflowUrl"
          } else {
            $commentLines += "Please validate. Once Validated, please send to the Space Owner for final production migration. Promotion workflow URL unavailable; include GITHUB_REPO in payload_json."
          }

          $commentText = $commentLines -join [Environment]::NewLine
          $commentBody = @{
            body = $commentText
          } | ConvertTo-Json -Depth 8

          if ([System.Convert]::ToBoolean($env:DRY_RUN)) {
            Write-Host "Dry run enabled. Would add Jira comment to $env:JIRA_KEY."
            Write-Host "Comment preview:"
            Write-Host $commentText
            return
          }

          Invoke-RestMethod -Method Post -Uri "$baseUrl/rest/api/2/issue/$env:JIRA_KEY/comment" -Headers $headers -Body $commentBody
          Write-Host "Added Jira comment to $env:JIRA_KEY."

          if (-not [string]::IsNullOrWhiteSpace($env:TRANSITION_ID)) {
            $transitionBody = @{
              transition = @{
                id = $env:TRANSITION_ID
              }
            } | ConvertTo-Json -Depth 5

            Invoke-RestMethod -Method Post -Uri "$baseUrl/rest/api/2/issue/$env:JIRA_KEY/transitions" -Headers $headers -Body $transitionBody
            Write-Host "Transitioned Jira issue $env:JIRA_KEY using transition ID $env:TRANSITION_ID."
          }
